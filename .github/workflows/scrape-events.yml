name: Weekly events scrape

on:
  schedule:
    # Monday 09:10 UTC ≈ 4:10–5:10 AM Atlanta time depending on DST.
    # Paired with the 14-day fetch horizon in scripts/scrape/index.mjs: every
    # event enters that window at least a week before it happens, so a single
    # weekly run is enough to catch it before the day arrives.
    - cron: '10 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/scrape/index.mjs
      - name: Commit updated events
        id: commit
        run: |
          git config user.name "events-bot"
          git config user.email "actions@github.com"
          git add public/data/events.json scripts/scrape/geocode-cache.json
          if git diff --cached --quiet; then
            echo "No event changes this week."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Weekly events update"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # A push made with the default GITHUB_TOKEN does NOT trigger deploy.yml's
      # `on: push` (GitHub's anti-recursion rule) — dispatch it explicitly.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
