name: Nightly events scrape

on:
  schedule:
    # 09:10 UTC ≈ 4:10–5:10 AM Atlanta time depending on DST
    - cron: '10 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/scrape/index.mjs
      - name: Commit updated events
        run: |
          git config user.name "events-bot"
          git config user.email "actions@github.com"
          git add public/data/events.json scripts/scrape/geocode-cache.json
          if git diff --cached --quiet; then
            echo "No event changes tonight."
          else
            git commit -m "Nightly events update"
            git push
          fi
